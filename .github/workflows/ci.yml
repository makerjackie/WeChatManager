name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 安装 XcodeGen
        run: brew install xcodegen
      - name: 生成工程
        run: xcodegen generate
      - name: 构建与测试
        run: >-
          xcodebuild test
          -project WeChatManager.xcodeproj
          -scheme WeChatManager
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
