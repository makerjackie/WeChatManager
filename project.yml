name: WeChatManager
options:
  bundleIdPrefix: com.makerjackie
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    DEVELOPMENT_TEAM: PCJ84YD7HQ
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    DEAD_CODE_STRIPPING: YES
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4
targets:
  WeChatManager:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.makerjackie.WeChatManager
        PRODUCT_NAME: WeChatManager
        INFOPLIST_FILE: Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/WeChatManager.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
  WeChatManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: WeChatManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.makerjackie.WeChatManagerTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WeChatManager.app/Contents/MacOS/WeChatManager"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  WeChatManager:
    build:
      targets:
        WeChatManager: all
        WeChatManagerTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - WeChatManagerTests
    archive:
      config: Release
